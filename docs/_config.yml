title: Claude Code、ローカル LLM でどこまで戦える？ Mac mini M4 Pro 検証
description: Mac mini M4 Pro 64GB で Ollama / MLX / Anthropic クラウドを T2-T5 同条件で徹底比較。常用はやはり厳しいが、Claude が落ちている時の避難先としてなら成立する
remote_theme: just-the-docs/just-the-docs
lang: ja_JP

url: https://j3tm0t0.github.io
baseurl: /local-llm-macmini

permalink: pretty

# OGP / Twitter Card defaults — picked up by jekyll-seo-tag
twitter:
  card: summary_large_image

defaults:
  - scope:
      path: ""
    values:
      image: /assets/model-comparison.png

color_scheme: dark
search_enabled: true

aux_links:
  "GitHub Repository":
    - "https://github.com/j3tm0t0/local-llm-macmini"
aux_links_new_tab: true

heading_anchors: true

footer_content: 'Source: <a href="https://github.com/j3tm0t0/local-llm-macmini">github.com/j3tm0t0/local-llm-macmini</a>'

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
